name: Generate Programmatic SEO Pages

on:
  workflow_dispatch:  # Manual trigger - button se chalao

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run generator
        run: node generate.js

      - name: Commit and push generated pages
        run: |
          git config user.name "PerfOptim Bot"
          git config user.email "bot@perfoptim.com"
          git add .
          git diff --staged --quiet || git commit -m "feat: generated programmatic SEO pages (USA + India + Canada)"
          git push
