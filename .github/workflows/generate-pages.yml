name: Generate Programmatic SEO Pages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (if package.json exists)
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping npm install"
          fi

      - name: Run USA generator
        run: node generate.js

      - name: Run India generator
        run: node generate-india.js

      - name: Run Canada generator
        run: node generate-canada.js

      - name: Commit and push generated pages
        run: |
          git config user.name "PerfOptim Bot"
          git config user.email "bot@perfoptim.com"
          git add .
          git diff --staged --quiet || git commit -m "feat: generated programmatic SEO pages (USA + India + Canada)"
          git push origin HEAD:main
